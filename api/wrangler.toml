name = "microblog-api"
main = "src/index.ts"
compatibility_date = "2026-04-12"

# Default variables (used by wrangler dev)
[vars]
ENVIRONMENT = "development"
ALLOW_ADMIN_BOOTSTRAP = "true"

# D1 Database binding (local development)
[[d1_databases]]
binding = "DB"
database_name = "microblog-db-local"
database_id = "local"

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "your-local-r2-bucket"

[env.production]
vars = { ENVIRONMENT = "production", ALLOW_ADMIN_BOOTSTRAP = "false" }

[[env.production.d1_databases]]
binding = "DB"
database_name = "your-production-d1-database"
database_id = "your-production-d1-database-id"

[[env.production.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "your-production-r2-bucket"

# Required secrets (set via wrangler secret put):
# - SESSION_SECRET
# Optional weather secrets:
# - QWEATHER_PRIVATE_KEY
# - QWEATHER_KEY_ID
# - QWEATHER_PROJECT_ID
